<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickWork Checklist</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Digital Visitor Logbook</h1>
  </header>

  <!-- login / signup forms -->
  <section id="login-section">
    <form id="login-form">
      <input type="text" id="login-username" placeholder="Username" required />
      <input type="password" id="login-password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <p style="text-align:center;">or <a href="#" id="show-signup">sign up</a></p>
  </section>
  <section id="signup-section" style="display:none;">
    <form id="signup-form">
      <input type="text" id="signup-username" placeholder="Username" required />
      <input type="password" id="signup-password" placeholder="Password" required />
      <select id="signup-role">
        <option value="guard">Guard</option>
        <option value="admin">Administrator</option>
      </select>
      <button type="submit">Sign Up</button>
    </form>
    <p style="text-align:center;">or <a href="#" id="show-login">login</a></p>
  </section>

  <!-- main app, hidden until logged in -->
  <section id="app-section" style="display:none;">
    <div id="user-info"></div>

    <h2>Register Visitor</h2>
    <form id="visitor-form">
      <input type="text" id="name" placeholder="Visitor name" required />
      <input type="text" id="address" placeholder="Address" required />
      <input type="text" id="contact" placeholder="Contact number" required />
      <input type="text" id="purpose" placeholder="Purpose of visit" required />
      <input type="text" id="person" placeholder="Person to visit" required />
      <input type="date" id="date" required />
      <input type="time" id="timein" required />
      <button type="submit">Register</button>
    </form>

    <h2>Search Visitors</h2>
    <form id="search-form">
      <input type="text" id="search-name" placeholder="Name" />
      <input type="date" id="search-date" />
      <button type="submit">Search</button>
    </form>

    <h2>Visitor Log</h2>
    <table id="visitor-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Address</th>
          <th>Contact</th>
          <th>Purpose</th>
          <th>Person</th>
          <th>Date</th>
          <th>In</th>
          <th>Out</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <script type="module" src="app.js"></script>
</body>
</html>
